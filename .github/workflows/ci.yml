name: Docker Build & Publish

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: write

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  submit_dependencies:
    name: Submit dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
  push:
    name: Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup curl
        uses: kordlib/setup-curl@v1
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'
      - run: ./gradlew linkReleaseExecutableLinuxX64 linkReleaseExecutableLinuxArm64
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          mkdir out
          cp build/bin/linux-amd64/releaseExecutable/alphabet.kexe out/alphabet-amd64.kexe
          cp build/bin/linux-arm64/releaseExecutable/alphabet.kexe out/alphabet-arm64.kexe
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64, linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
